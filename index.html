<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fff8f1">
  <meta name="description" content="Entre gratuitamente no Grupo VIP da Lorena Achadinhos e receba promoções, cupons e ofertas todos os dias.">
  <title>Lorena Achadinhos | Grupo VIP</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}

    body{
      color:#201917;
      font-family:"DM Sans",sans-serif;
      background:
        radial-gradient(circle at 50% 0%,rgba(255,255,255,.98),transparent 42%),
        linear-gradient(180deg,#fffaf6 0%,#fff5ed 100%);
    }

    .page{
      min-height:100svh;
      display:grid;
      place-items:start center;
      padding:10px 14px 18px;
    }

    .hero{
      width:min(100%,600px);
      text-align:center;
    }

    .logo{
      display:block;
      width:112px;
      height:112px;
      object-fit:cover;
      object-position:center;
      margin:0 auto 5px;
      border-radius:50%;
    }

    h1{
      max-width:560px;
      margin:0 auto;
      font-family:"DM Sans",sans-serif;
      font-size:clamp(1.65rem,7.2vw,2.25rem);
      line-height:1.12;
      letter-spacing:-.035em;
      font-weight:800;
    }

    h1 span{
      color:#f05f7b;
      white-space:nowrap;
    }

    .description{
      max-width:550px;
      margin:15px auto 0;
      color:#59514e;
      font-size:clamp(.88rem,3.4vw,.98rem);
      line-height:1.5;
    }

    .description strong{
      color:#201917;
      font-weight:800;
    }

    .instruction{
      margin:14px 0 8px;
      color:#4d4643;
      font-size:.82rem;
      font-weight:600;
    }

    .cta{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:min(100%,520px);
      min-height:58px;
      margin:0 auto;
      padding:13px 18px;
      border:2px solid rgba(255,255,255,.95);
      border-radius:17px;
      color:#fff;
      background:
        linear-gradient(180deg,rgba(117,255,89,.42),transparent 38%),
        linear-gradient(180deg,#1dbc5b 0%,#0a9843 55%,#087d37 100%);
      box-shadow:
        0 7px 0 #06692d,
        0 13px 23px rgba(7,130,55,.28),
        0 0 18px rgba(55,219,110,.34);
      text-decoration:none;
      font-size:1rem;
      font-weight:800;
    }

    .wa{
      display:block;
      width:26px !important;
      height:26px !important;
      min-width:26px;
      max-width:26px;
      flex:0 0 26px;
      fill:currentColor;
    }

    .proof{
      margin-top:14px;
    }

    .proof img{
      display:block;
      width:min(82%,430px);
      height:auto;
      margin:0 auto -3px;
    }

    .proof p{
      margin:0 auto;
      max-width:500px;
      font-size:.84rem;
      line-height:1.35;
      font-weight:600;
    }

    .proof strong{
      color:#f05f7b;
    }

    @media (min-width:700px){
      .page{padding-top:14px}
      .logo{width:124px;height:124px}
      h1{font-size:2.35rem}
      .description{font-size:1rem}
    }

    @media (max-height:740px) and (max-width:520px){
      .page{padding-top:6px}
      .logo{width:92px;height:92px}
      h1{font-size:1.48rem}
      .description{margin-top:9px;font-size:.8rem;line-height:1.4}
      .instruction{margin-top:9px;margin-bottom:6px}
      .cta{min-height:52px;padding:10px 14px}
      .proof{margin-top:9px}
      .proof img{width:72%}
      .proof p{font-size:.76rem}
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <img class="logo" src="logo-lorena-achadinhos.png" alt="Lorena Achadinhos">

      <h1>
        Economize tempo e dinheiro com descontos de até <span>70%</span> ✨
      </h1>

      <p class="description">
        <strong>Grupo VIP Gratuito:</strong> receba diariamente cupons, promoções e ofertas das melhores lojas:
        Shopee, Amazon, Mercado Livre, Magalu e muito mais.
      </p>

      <p class="instruction">clique abaixo e entre:</p>

      <a
        id="whatsapp-button"
        class="cta"
        href="https://chat.whatsapp.com/C11TP77SFNh0zlJNwjh9Ky?mode=gi_t"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg class="wa" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M16 3.3A12.6 12.6 0 0 0 5.2 22.4L3.5 28.6l6.4-1.7A12.6 12.6 0 1 0 16 3.3Zm0 2.4a10.2 10.2 0 1 1-5.2 19l-.4-.2-3.7 1 1-3.6-.2-.4A10.2 10.2 0 0 1 16 5.7Zm-4.4 4.9c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.2.2 2.1 3.2 5.1 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.3-.7.3-1.3.2-1.4-.1-.1-.3-.2-.6-.4l-2.1-1c-.3-.1-.5-.1-.7.2l-1 1.2c-.2.2-.3.2-.6.1-.3-.2-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6l.5-.5.3-.5c.1-.2 0-.4 0-.5l-.9-2.2c-.3-.6-.5-.5-.7-.5Z"/>
        </svg>
        QUERO PARTICIPAR
      </a>

      <div class="proof">
        <img src="avatares.png" alt="Pessoas que acompanham nossas promoções">
        <p>Mais de <strong>8.700 pessoas</strong> economizam todos os dias no nosso grupo!</p>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("whatsapp-button").addEventListener("click", function () {
      if (typeof window.fbq === "function") {
        window.fbq("track", "Lead");
      }
    });
  </script>
</body>
</html>
